name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist on the branch, e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libgl-dev \
            libx11-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        run: strip "target/${{ matrix.target }}/release/disksun"

      - name: Package
        run: |
          set -eu
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          stem="disksun-${tag}-${{ matrix.target }}"
          mkdir -p "dist/$stem"
          cp "target/${{ matrix.target }}/release/disksun" "dist/$stem/"
          cp LICENSE README.md "dist/$stem/"
          cp contrib/disksun-launch.sh "dist/$stem/"
          tar -C dist -czf "$stem.tar.gz" "$stem"
          sha256sum "$stem.tar.gz" > "$stem.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: disksun-${{ matrix.target }}
          path: |
            disksun-*.tar.gz
            disksun-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
