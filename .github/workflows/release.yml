name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must already exist on the branch, e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libgl-dev \
            libx11-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        run: strip "target/${{ matrix.target }}/release/disksun"

      - name: Build .deb
        run: cargo deb --target ${{ matrix.target }} --no-build --no-strip

      - name: Build .rpm
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          set -eu
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          stem="disksun-${tag}-${{ matrix.target }}"
          mkdir -p "dist/$stem/contrib"
          cp "target/${{ matrix.target }}/release/disksun" "dist/$stem/"
          cp LICENSE README.md                              "dist/$stem/"
          cp packaging/install.sh                           "dist/$stem/"
          chmod +x "dist/$stem/install.sh"
          cp contrib/disksun-launch.sh \
             contrib/disksun.desktop \
             contrib/disksun.svg \
             contrib/install-desktop.sh \
             "dist/$stem/contrib/"
          tar -C dist -czf "$stem.tar.gz" "$stem"

      - name: Collect artifacts
        run: |
          set -eu
          mv target/${{ matrix.target }}/debian/*.deb        .
          mv target/${{ matrix.target }}/generate-rpm/*.rpm  .
          ls -la *.tar.gz *.deb *.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: disksun-${{ matrix.target }}
          path: |
            disksun-*.tar.gz
            *.deb
            *.rpm
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # one manifest covering every artifact (verify: sha256sum -c SHA256SUMS)
      - name: Checksum manifest
        run: |
          set -eu
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          # deterministic body, overwritten on each (re-)publish —
          # generate_release_notes appended another "Full Changelog"
          # line to the body every time the tag was re-pushed
          body: "**Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.event.inputs.tag || github.ref_name }}"
          fail_on_unmatched_files: true

      # re-published releases only replace same-named assets; drop the
      # per-file .sha256 sidecars that predate the SHA256SUMS manifest
      - name: Remove obsolete per-file .sha256 assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" \
            --json assets -q '.assets[].name' \
            | grep '\.sha256$' | while read -r a; do
              gh release delete-asset "$tag" "$a" --repo "$GITHUB_REPOSITORY" --yes
            done || true
